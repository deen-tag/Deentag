<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Duas — Lueur</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=Amiri:wght@400;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body data-page="duas">
<div class="lr-shell">

  <header class="lr-header">
    <div class="lr-brand">Duas</div>
    <button class="lr-iconbtn" aria-label="Réglages">⚙</button>
  </header>

  <div class="lr-horizon-wrap lr-anim">
    <div class="lr-horizon" id="lrHorizon"></div>
    <div class="lr-horizon-caption">
      <span>Cycle des prières</span>
      <span>Prochain : <b id="lrHorizonNext">—</b> · dans <span class="lr-countdown" id="lrHorizonCountdown">—</span></span>
    </div>
  </div>

  <div class="lr-filterbar lr-anim" id="lrFilterbar"></div>

  <div id="lrDuaList"></div>

</div>

<nav class="lr-tabbar">
  <div class="lr-tabbar-inner">
    <a class="lr-tab" data-tab="accueil" href="index.html"><span class="lr-glyph">⌂</span>Accueil</a>
    <a class="lr-tab" data-tab="duas" href="duas.html"><span class="lr-glyph">✦</span>Duas</a>
    <a class="lr-tab" data-tab="quran" href="quran.html"><span class="lr-glyph">▣</span>Coran</a>
  </div>
</nav>

<script src="js/duas-data.js"></script>
<script src="js/app.js"></script>
<script>
  let activeCat = (location.hash || "").replace("#","") || "all";

  function renderFilters(){
    const bar = document.getElementById("lrFilterbar");
    bar.innerHTML = "";
    const all = document.createElement("button");
    all.className = "lr-chip" + (activeCat==="all" ? " is-active" : "");
    all.textContent = "Tout";
    all.onclick = ()=>{ activeCat="all"; renderFilters(); renderDuas(); };
    bar.appendChild(all);
    LR_CATEGORIES.forEach(c=>{
      const chip = document.createElement("button");
      chip.className = "lr-chip" + (activeCat===c.id ? " is-active" : "");
      chip.textContent = c.name;
      chip.onclick = ()=>{ activeCat=c.id; renderFilters(); renderDuas(); };
      bar.appendChild(chip);
    });
  }

  function speak(dua){
    if(!("speechSynthesis" in window)) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(dua.ar);
    u.lang = "ar-SA";
    u.rate = 0.85;
    window.speechSynthesis.speak(u);
  }

  function copyDua(dua, btn){
    const text = `${dua.ar}\n${dua.phon}\n${dua.fr}`;
    navigator.clipboard.writeText(text).then(()=>{
      const old = btn.textContent;
      btn.textContent = "Copié";
      setTimeout(()=>btn.textContent = old, 1200);
    });
  }

  function renderDuas(){
    const list = document.getElementById("lrDuaList");
    list.innerHTML = "";
    const items = activeCat==="all" ? LR_DUAS : LR_DUAS.filter(d=>d.cat===activeCat);
    items.forEach(dua=>{
      const cat = LR_CATEGORIES.find(c=>c.id===dua.cat);
      const card = document.createElement("div");
      card.className = "lr-dua lr-anim";
      card.innerHTML = `
        <div class="lr-dua-head">
          <div>
            <div class="lr-dua-name">${dua.name}</div>
            <div class="lr-dua-meta">${cat ? cat.name : ""} · ${dua.src}</div>
          </div>
          <span class="lr-dua-chev">⌄</span>
        </div>
        <div class="lr-dua-body">
          <div class="lr-dua-content">
            <p class="lr-dua-arabic">${dua.ar}</p>
            <p class="lr-dua-phon">${dua.phon}</p>
            <p class="lr-dua-fr">${dua.fr}</p>
            <div class="lr-dua-actions">
              <button class="lr-btn-ghost lr-speak">▶ Écouter</button>
              <button class="lr-btn-ghost lr-copy">⧉ Copier</button>
            </div>
          </div>
        </div>
      `;
      card.querySelector(".lr-dua-head").onclick = ()=>card.classList.toggle("is-open");
      card.querySelector(".lr-speak").onclick = (e)=>{ e.stopPropagation(); speak(dua); };
      card.querySelector(".lr-copy").onclick = (e)=>{ e.stopPropagation(); copyDua(dua, e.target); };
      list.appendChild(card);
    });
  }

  renderFilters();
  renderDuas();
</script>
</body>
</html>
