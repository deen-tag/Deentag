<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Coran — Lueur</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=Amiri:wght@400;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body data-page="quran">
<div class="lr-shell">

  <header class="lr-header">
    <div class="lr-brand">Coran</div>
    <button class="lr-iconbtn" aria-label="Réglages">⚙</button>
  </header>

  <div class="lr-horizon-wrap lr-anim">
    <div class="lr-horizon" id="lrHorizon"></div>
    <div class="lr-horizon-caption">
      <span>Cycle des prières</span>
      <span>Prochain : <b id="lrHorizonNext">—</b> · dans <span class="lr-countdown" id="lrHorizonCountdown">—</span></span>
    </div>
  </div>

  <div id="lrSurahListView">
    <div class="lr-search lr-anim">
      <span>⌕</span>
      <input id="lrSearchInput" type="text" placeholder="Chercher une sourate…">
    </div>
    <div class="lr-surah-list" id="lrSurahList"></div>
  </div>

  <div id="lrReaderView" style="display:none;">
    <button class="lr-backbtn" id="lrBackBtn">← Toutes les sourates</button>
    <div class="lr-reader-head">
      <div class="lr-reader-title" id="lrReaderTitle">—</div>
      <div class="lr-fontctl">
        <button id="lrFontMinus" aria-label="Réduire le texte">A−</button>
        <button id="lrFontPlus" aria-label="Agrandir le texte">A+</button>
      </div>
    </div>
    <div id="lrVerses"></div>
  </div>

</div>

<nav class="lr-tabbar">
  <div class="lr-tabbar-inner">
    <a class="lr-tab" data-tab="accueil" href="index.html"><span class="lr-glyph">⌂</span>Accueil</a>
    <a class="lr-tab" data-tab="duas" href="duas.html"><span class="lr-glyph">✦</span>Duas</a>
    <a class="lr-tab" data-tab="quran" href="quran.html"><span class="lr-glyph">▣</span>Coran</a>
  </div>
</nav>

<script src="js/app.js"></script>
<script src="js/quran.js"></script>
</body>
</html>
