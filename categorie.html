<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Deentag</title>
<link rel="stylesheet" href="css/style.css">
<link rel="icon" href="favicon.png" type="image/png">
<style>
/* ===== CATEGORIE PAGE ===== */
.page-wrap { min-height:100vh; background:var(--bg); }

.cat-topbar {
  width:100%; display:flex; justify-content:space-between; align-items:center;
  padding:12px 18px 10px;
  background:var(--bg);
  border-bottom:1px solid var(--card-border);
  position:sticky; top:0; z-index:200;
}
.cat-topbar .topbar-center {
  position:absolute; left:50%; transform:translateX(-50%);
}

/* back btn */
.back-btn { display:flex; align-items:center; gap:8px; text-decoration:none; }
.back-circle {
  width:32px; height:32px; border-radius:50%;
  border:1.5px solid var(--gold);
  display:flex; align-items:center; justify-content:center;
  color:var(--gold); font-size:17px; transition:all 0.2s;
  background:transparent;
}
.back-circle:active { background:var(--gold); color:var(--bg); transform:scale(0.92); }
.back-lbl {
  font-family:'Cinzel',serif; font-size:10px; letter-spacing:0.18em;
  color:var(--text3); text-transform:uppercase;
}

/* header catégorie */
.cat-header {
  display:flex; flex-direction:column; align-items:center;
  padding:18px 20px 8px; gap:4px;
}
.cat-header-icon {
  width:54px; height:54px; border-radius:50%;
  background:rgba(201,168,76,0.10);
  border:1.5px solid rgba(201,168,76,0.35);
  display:flex; align-items:center; justify-content:center;
  margin-bottom:4px;
}
body.night .cat-header-icon {
  background:rgba(201,168,76,0.16);
  border-color:rgba(201,168,76,0.50);
}
.cat-header-icon img { width:34px; height:34px; object-fit:contain; }
.cat-header-name {
  font-family:'Cinzel',serif; font-size:18px; letter-spacing:0.18em;
  color:var(--gold); font-weight:600; text-align:center;
}
.cat-header-sub {
  font-family:'Cormorant Garamond',serif; font-style:italic;
  font-size:13px; color:var(--text3); letter-spacing:0.06em;
}

/* ornament */
.ornament-bar {
  display:flex; align-items:center; gap:10px;
  padding:0 24px; margin:6px 0 14px;
}
.ornament-bar-line {
  flex:1; height:1px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
  opacity:0.4;
}
.ornament-bar-center {
  display:flex; align-items:center; gap:5px;
}
.ornament-bar-diamond {
  width:5px; height:5px; background:var(--gold);
  transform:rotate(45deg); opacity:0.65;
}

/* grille sous-catégories */
.sub-grid {
  display:grid; grid-template-columns:1fr 1fr;
  gap:10px; padding:0 13px 24px;
}

/* cartes sous-catégories — pleine largeur si nombre impair */
.sub-grid.cols-1 { grid-template-columns:1fr; }
.sub-grid.cols-3 .sub-card:last-child { grid-column:1/-1; max-width:calc(50% - 7px); margin:0 auto; width:100%; }

.sub-card {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:8px; padding:14px 10px 12px;
  border-radius:14px; text-decoration:none; cursor:pointer;
  position:relative; overflow:hidden;
  background:var(--card-bg);
  border:1px solid var(--card-border);
  box-shadow:0 4px 18px var(--shadow);
  transition:transform 0.18s, box-shadow 0.18s;
  opacity:0; transform:translateY(14px);
  animation:subIn 0.4s ease forwards;
}
.sub-card::before {
  content:''; position:absolute; inset:0; border-radius:18px;
  background:linear-gradient(135deg,rgba(201,168,76,0.07) 0%,transparent 55%);
  pointer-events:none;
}
.sub-card::after {
  content:''; position:absolute; top:0; right:0;
  width:20px; height:20px;
  border-top:1.5px solid var(--gold);
  border-right:1.5px solid var(--gold);
  border-radius:0 14px 0 0; opacity:0.38;
  pointer-events:none;
}
.sub-card:active { transform:scale(0.95); box-shadow:0 2px 10px var(--shadow); }

/* nuit */
body.night .sub-card {
  background:#1E1A0F;
  border-color:rgba(201,168,76,0.45);
  box-shadow:0 4px 22px rgba(0,0,0,0.55), inset 0 1px 0 rgba(201,168,76,0.08);
}
body.night .sub-card::after { opacity:0.6; }
body.kids .sub-card::after {
  border-top-color: var(--kids-color) !important;
  border-right-color: var(--kids-color) !important;
}

.sub-card-num {
  font-family:'Cinzel',serif; font-size:9px; letter-spacing:0.2em;
  color:var(--gold); opacity:0.6;
}
.sub-card-title {
  font-family:'Cinzel',serif; font-size:10px; font-weight:500;
  letter-spacing:0.10em; color:var(--text); text-align:center; line-height:1.4;
}
body.night .sub-card-title { color:#F5E4A0; }

.sub-card-sub {
  font-family:'Cormorant Garamond',serif; font-style:italic;
  font-size:11px; color:var(--gold); letter-spacing:0.04em;
  opacity:0.8; text-align:center; line-height:1.35;
}

/* sunnah card style différent */
.sub-card.sunnah-card {
  background:linear-gradient(145deg,rgba(201,168,76,0.08),transparent);
  border-color:rgba(201,168,76,0.4);
}
body.night .sub-card.sunnah-card {
  background:linear-gradient(145deg,rgba(201,168,76,0.14),#1E1A0F);
  border-color:rgba(201,168,76,0.55);
}
.sub-card.sunnah-card .sub-card-title { color:var(--gold); }
body.night .sub-card.sunnah-card .sub-card-title { color:#E8C97A; }

/* stagger */
.sub-card:nth-child(1){animation-delay:0.05s}
.sub-card:nth-child(2){animation-delay:0.10s}
.sub-card:nth-child(3){animation-delay:0.15s}
.sub-card:nth-child(4){animation-delay:0.20s}
@keyframes subIn { to{opacity:1;transform:translateY(0)} }

/* lang blocks */
.lang-block{display:none}
.lang-block.active{display:inline}
span.lang-block.active{display:inline}
div.lang-block.active{display:block}
</style>
</head>
<body class="day page-wrap">

<!-- TOP BAR -->
<div class="cat-topbar">
    <button class="kids-btn" onclick="toggleKidsMode()" title="Mode enfants">👶</button>

  <div class="topbar-center">
    <div class="lang-wrapper">
      <button class="lang-btn" id="lang-btn" onclick="toggleLangMenu()">FR &#9662;</button>
      <div class="lang-menu" id="lang-menu">
        <span class="lang-option" data-lang="fr" onclick="setLang('fr')">Fran&#231;ais</span>
        <span class="lang-option" data-lang="en" onclick="setLang('en')">English</span>
        <span class="lang-option" data-lang="es" onclick="setLang('es')">Espa&#241;ol</span>
      </div>
    </div>
  </div>
      <div class="theme-wrapper">
    <span class="theme-emoji">&#9728;&#65039;</span>
    <div class="theme-toggle" onclick="toggleTheme()"><div class="knob" id="theme-knob"></div></div>
    <span class="theme-emoji">&#127769;</span>
  </div>
</div>
<div class="inv-subbar"><a class="back-btn" href="index.html">
    <div class="back-circle">&#8592;</div>
    <span class="back-lbl">
      <span class="lang-block" data-lang-block="fr">Retour</span>
      <span class="lang-block" data-lang-block="en">Back</span>
      <span class="lang-block" data-lang-block="es">Volver</span>
    </span>
  </a></div>

<!-- HEADER DYNAMIQUE -->
<div class="cat-header" id="cat-header">
  <div class="cat-header-icon">
    <img id="cat-icon" src="" alt="">
  </div>
  <div class="cat-header-name" id="cat-name"></div>
  <div class="cat-header-sub" id="cat-sub">
    <span class="lang-block" data-lang-block="fr">Invocations</span>
    <span class="lang-block" data-lang-block="en">Supplications</span>
    <span class="lang-block" data-lang-block="es">Invocaciones</span>
  </div>
</div>

<div class="ornament-bar">
  <div class="ornament-bar-line"></div>
  <div class="ornament-bar-center">
    <div class="ornament-bar-diamond"></div>
    <span style="color:var(--gold);font-size:12px">&#10022;</span>
    <div class="ornament-bar-diamond"></div>
  </div>
  <div class="ornament-bar-line"></div>
</div>

<!-- GRILLE SOUS-CATÉGORIES (injectée par JS) -->
<div class="sub-grid" id="sub-grid"></div>

<script>
const DATA = {"repas": {"fr": "Repas", "en": "Meals", "es": "Comidas", "icon": "repas.png", "items": [{"id": "acc1", "fr": "Avant de manger", "en": "Before eating", "es": "Antes de comer", "sub_fr": "Bismillah", "sub_en": "Bismillah", "sub_es": "Bismillah"}, {"id": "acc2", "fr": "Oubli du Bismillah", "en": "Forgot Bismillah", "es": "Olvidé el Bismillah", "sub_fr": "Si tu oublies", "sub_en": "If forgotten", "sub_es": "Si olvidaste"}, {"id": "acc3", "fr": "Après avoir mangé", "en": "After eating", "es": "Después de comer", "sub_fr": "Al-hamdulillah", "sub_en": "Al-hamdulillah", "sub_es": "Al-hamdulillah"}, {"id": "acc4", "fr": "Sunnahs du Prophète ﷺ", "en": "Prophet's Sunnahs ﷺ", "es": "Sunnahs del Profeta ﷺ", "sub_fr": "Pratiques recommandées", "sub_en": "Recommended practices", "sub_es": "Prácticas recomendadas", "sunnah": true}]}, "reveil": {"fr": "Réveil & Couché", "en": "Wake & Sleep", "es": "Despertar & Dormir", "icon": "lit.png", "items": [{"id": "acc1", "fr": "Au réveil", "en": "Upon waking", "es": "Al despertar", "sub_fr": "Au lever du sommeil", "sub_en": "When waking up", "sub_es": "Al despertarse"}, {"id": "acc2", "fr": "Avant de dormir", "en": "Before sleeping", "es": "Antes de dormir", "sub_fr": "Invocation du coucher", "sub_en": "Bedtime supplication", "sub_es": "Invocación al acostarse"}, {"id": "acc3", "fr": "Variante complète", "en": "Complete variant", "en_sub": "Extended version", "es": "Variante completa", "sub_fr": "Version longue", "sub_en": "Extended version", "sub_es": "Versión larga"}, {"id": "acc4", "fr": "Sunnahs du Prophète ﷺ", "en": "Prophet's Sunnahs ﷺ", "es": "Sunnahs del Profeta ﷺ", "sub_fr": "Pratiques recommandées", "sub_en": "Recommended practices", "sub_es": "Prácticas recomendadas", "sunnah": true}]}, "ablution": {"fr": "Ablution", "en": "Ablution", "es": "Ablución", "icon": "ablution.png", "items": [{"id": "acc1", "fr": "Avant le wudu", "en": "Before wudu", "es": "Antes del wudu", "sub_fr": "Niyyah & Basmala", "sub_en": "Intention & Basmala", "sub_es": "Niyyah & Basmala"}, {"id": "acc2", "fr": "Shahada après wudu", "en": "Shahada after wudu", "es": "Shahada tras wudu", "sub_fr": "Témoignage de foi", "sub_en": "Testimony of faith", "sub_es": "Testimonio de fe"}, {"id": "acc3", "fr": "Dou'a complète après", "en": "Full dua after wudu", "es": "Dua completa", "sub_fr": "Très récompensée", "sub_en": "Highly rewarded", "sub_es": "Muy recompensada"}, {"id": "acc4", "fr": "Sunnahs du Prophète ﷺ", "en": "Prophet's Sunnahs ﷺ", "es": "Sunnahs del Profeta ﷺ", "sub_fr": "Pratiques recommandées", "sub_en": "Recommended practices", "sub_es": "Prácticas recomendadas", "sunnah": true}]}, "toilettes": {"fr": "Toilettes", "en": "Restroom", "es": "Baño", "icon": "wc.png", "items": [{"id": "acc1", "fr": "Avant d'entrer", "en": "Before entering", "es": "Antes de entrar", "sub_fr": "Protection contre le mal", "sub_en": "Protection from evil", "sub_es": "Protección del mal"}, {"id": "acc2", "fr": "Après être sorti", "en": "After leaving", "es": "Al salir", "sub_fr": "Ghufraanak", "sub_en": "Ghufraanak", "sub_es": "Ghufraanak"}, {"id": "acc3", "fr": "Sunnahs du Prophète ﷺ", "en": "Prophet's Sunnahs ﷺ", "es": "Sunnahs del Profeta ﷺ", "sub_fr": "Pratiques recommandées", "sub_en": "Recommended practices", "sub_es": "Prácticas recomendadas", "sunnah": true}]}, "maison": {"fr": "Maison", "en": "Home", "es": "Casa", "icon": "maison.png", "items": [{"id": "acc1", "fr": "En entrant", "en": "Entering home", "es": "Al entrar", "sub_fr": "Invocation d'entrée", "sub_en": "Entry supplication", "sub_es": "Invocación de entrada"}, {"id": "acc2", "fr": "Variante recommandée", "en": "Recommended variant", "es": "Variante recomendada", "sub_fr": "Version plus complète", "sub_en": "More complete version", "sub_es": "Versión más completa"}, {"id": "acc3", "fr": "En sortant", "en": "When leaving", "es": "Al salir", "sub_fr": "Tawakkul sur Allah", "sub_en": "Trust in Allah", "sub_es": "Tawakkul en Allah"}, {"id": "acc4", "fr": "Protection égarement", "en": "Protection from straying", "es": "Protección del extravío", "sub_fr": "Contre l'égarement", "sub_en": "Against going astray", "sub_es": "Contra el extravío"}]}, "tristesse": {"fr": "Tristesse", "en": "Sadness", "es": "Tristeza", "icon": "tristesse.png", "items": [{"id": "acc1", "fr": "Tristesse & chagrin", "en": "Sadness & grief", "es": "Tristeza & pena", "sub_fr": "Pour les moments difficiles", "sub_en": "For difficult moments", "sub_es": "Para momentos difíciles"}, {"id": "acc2", "fr": "Dua du Coran", "en": "Quranic dua", "es": "Dua coránica", "sub_fr": "Printemps du cœur", "sub_en": "Spring of the heart", "sub_es": "Primavera del corazón"}, {"id": "acc3", "fr": "Sunnahs du Prophète ﷺ", "en": "Prophet's Sunnahs ﷺ", "es": "Sunnahs del Profeta ﷺ", "sub_fr": "Pratiques recommandées", "sub_en": "Recommended practices", "sub_es": "Prácticas recomendadas", "sunnah": true}]}, "enfants": {"fr": "Enfants", "en": "Children", "es": "Niños", "icon": "enfants.png", "items": [{"id": "acc1", "fr": "Protéger ses enfants", "en": "Protecting children", "es": "Proteger a los hijos", "sub_fr": "Invocation principale", "sub_en": "Main supplication", "sub_es": "Invocación principal"}, {"id": "acc2", "fr": "Enfant unique", "en": "Only child", "es": "Hijo único", "sub_fr": "Variante spécifique", "sub_en": "Specific variant", "sub_es": "Variante específica"}, {"id": "acc3", "fr": "Sunnahs — Protections ﷺ", "en": "Sunnahs — Protections ﷺ", "es": "Sunnahs — Protecciones ﷺ", "sub_fr": "Pratiques recommandées", "sub_en": "Recommended practices", "sub_es": "Prácticas recomendadas", "sunnah": true}]}, "transport": {"fr": "Transport", "en": "Transport", "es": "Transporte", "icon": "voiture.png", "items": [{"id": "acc1", "fr": "Prendre un transport", "en": "Boarding transport", "es": "Tomar transporte", "sub_fr": "Subhâna alladhî", "sub_en": "Subhâna alladhî", "sub_es": "Subhâna alladhî"}, {"id": "acc2", "fr": "Longs trajets", "en": "Long journeys", "es": "Viajes largos", "sub_fr": "Variante complète", "sub_en": "Complete variant", "sub_es": "Variante completa"}, {"id": "acc3", "fr": "Sunnahs du Prophète ﷺ", "en": "Prophet's Sunnahs ﷺ", "es": "Sunnahs del Profeta ﷺ", "sub_fr": "Pratiques recommandées", "sub_en": "Recommended practices", "sub_es": "Prácticas recomendadas", "sunnah": true}]}};

let currentLang = 'fr';

function detectLang(){const l=(navigator.language||'fr').toLowerCase();if(l.startsWith('es'))return'es';if(l.startsWith('en'))return'en';return'fr';}
function applyLangBlocks(lang){document.querySelectorAll('[data-lang-block]').forEach(el=>{el.classList.toggle('active',el.getAttribute('data-lang-block')===lang);});}
function applyLang(lang){
  currentLang=lang;
  localStorage.setItem('deentag_lang',lang);
  const btn=document.getElementById('lang-btn');
  if(btn)btn.textContent=lang.toUpperCase()+' \u25be';
  document.querySelectorAll('.lang-option').forEach(o=>o.classList.toggle('active',o.dataset.lang===lang));
  applyLangBlocks(lang);
  renderPage();
}
function setLang(lang){applyLang(lang);closeLangMenu();}
function toggleLangMenu(){document.getElementById('lang-menu').classList.toggle('open');}
function closeLangMenu(){document.getElementById('lang-menu').classList.remove('open');}
document.addEventListener('click',e=>{if(!e.target.closest('.lang-wrapper'))closeLangMenu();});
function applyTheme(t){document.body.classList.toggle('day',t==='day');document.body.classList.toggle('night',t==='night');localStorage.setItem('deentag_theme',t);}

function toggleKidsMode() {
  const isKids = document.body.classList.contains('kids');
  document.body.classList.toggle('kids', !isKids);
  localStorage.setItem('deentag_kids', isKids ? 'off' : 'on');
}
function toggleTheme(){applyTheme(document.body.classList.contains('day')?'night':'day');}

function getCat(){
  const p = new URLSearchParams(window.location.search);
  return p.get('cat') || 'repas';
}

function renderPage(){
  const cat = getCat();
  const d = DATA[cat];
  if(!d){ document.title='Deentag'; return; }

  const lang = currentLang;

  // Icon & name
  document.getElementById('cat-icon').src = 'images/' + d.icon;
  document.getElementById('cat-icon').alt = d[lang] || d.fr;
  document.getElementById('cat-name').textContent = (d[lang]||d.fr).replace(/&amp;/g,'&');
  document.title = 'Deentag — ' + (d[lang]||d.fr).replace(/&amp;/g,'&');

  // Build cards
  const grid = document.getElementById('sub-grid');
  grid.innerHTML = '';

  const items = d.items;
  // column count class
  grid.className = 'sub-grid';
  if(items.length===3) grid.classList.add('cols-3');

  items.forEach((item, i) => {
    const page = cat + '.html';
    const isSunnah = !!item.sunnah;

    const card = document.createElement('a');
    card.href = page + '#' + item.id;
    card.className = 'sub-card' + (isSunnah ? ' sunnah-card' : '');
    card.onclick = function(e){
      e.preventDefault();
      sessionStorage.setItem('deentag_open_acc', item.id);
      window.location.href = page;
    };

    const numEl = document.createElement('div');
    numEl.className = 'sub-card-num';
    numEl.textContent = String(i+1).padStart(2,'0');

    const titleEl = document.createElement('div');
    titleEl.className = 'sub-card-title';
    titleEl.textContent = (item[lang] || item.fr || '').replace(/&amp;/g,'&');

    const subEl = document.createElement('div');
    subEl.className = 'sub-card-sub';
    const subKey = 'sub_' + lang;
    subEl.textContent = (item[subKey] || item.sub_fr || '').replace(/&amp;/g,'&');

    card.appendChild(numEl);
    card.appendChild(titleEl);
    card.appendChild(subEl);
    grid.appendChild(card);
  });
}

(function(){
  const l = localStorage.getItem('deentag_lang') || detectLang();
  const t = localStorage.getItem('deentag_theme') || 'day';
  currentLang = l;
  applyTheme(t);
  if(localStorage.getItem('deentag_kids')==='on') document.body.classList.add('kids');
  // apply lang without re-rendering twice
  localStorage.setItem('deentag_lang', l);
  const btn = document.getElementById('lang-btn');
  if(btn) btn.textContent = l.toUpperCase() + ' \u25be';
  document.querySelectorAll('.lang-option').forEach(o=>o.classList.toggle('active',o.dataset.lang===l));
  applyLangBlocks(l);
  renderPage();
})();
</script>
</body>
</html>
