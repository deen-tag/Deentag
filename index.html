<style>
/* ===== WHEEL MENU INDEX ===== */
.wheel-section {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px 0 10px;
}
.wheel-container {
  position: relative;
  width: 360px;
  height: 360px;
  margin: 0 auto;
}
/* Logo centre : plus petit que les icônes */
.wheel-center {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 62px; height: 62px;
  border-radius: 50%;
  background: var(--card-bg);
  border: 2px solid var(--gold);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; z-index: 10;
  box-shadow: 0 0 0 0 rgba(201,168,76,0);
  transition: box-shadow 0.4s ease;
  overflow: hidden;
}
.wheel-center img {
  width: 40px; height: 40px;
  object-fit: contain; border-radius: 50%;
  transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
}
.wheel-center.active-cat {
  border-color: var(--gold);
  box-shadow: 0 0 20px 4px rgba(201,168,76,0.45);
}
.wheel-ring {
  position: absolute;
  top: 50%; left: 50%;
  width: 250px; height: 250px;
  transform: translate(-50%, -50%);
  border-radius: 50%;
  border: 1px dashed rgba(201,168,76,0.2);
  pointer-events: none;
}
/* Icônes principales : plus grandes que le centre */
.wheel-item {
  position: absolute;
  width: 86px; height: 86px;
  transform: translate(-50%, -50%);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  cursor: pointer;
  transition: transform 0.5s cubic-bezier(0.34,1.56,0.64,1), opacity 0.4s ease;
  z-index: 5;
  text-decoration: none;
  -webkit-tap-highlight-color: transparent;
}
.wheel-item.hidden {
  opacity: 0;
  pointer-events: none;
  transform: translate(-50%, -50%) scale(0.2);
}
.wheel-item-circle {
  width: 74px; height: 74px;
  border-radius: 50%;
  background: var(--card-bg);
  border: 1.5px solid var(--card-border);
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
  transition: border-color 0.25s, box-shadow 0.25s, transform 0.2s;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}
.wheel-item:active .wheel-item-circle {
  border-color: var(--gold);
  box-shadow: 0 0 14px 3px rgba(201,168,76,0.4);
  transform: scale(1.1);
}
.wheel-item img { width: 48px; height: 48px; object-fit: contain; }
.wheel-item-label {
  font-size: 8px;
  font-family: 'Cinzel', serif;
  color: var(--text3);
  text-align: center;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  margin-top: 3px;
  line-height: 1.2;
  white-space: nowrap;
}
/* Labels plus lumineux en mode nuit → dans style.css */
/* Sub-items : même taille que les items principaux */
.wheel-item.sub-item .wheel-item-circle {
  width: 74px; height: 74px;
  border-color: rgba(201,168,76,0.35);
}
.wheel-item.sub-item img { width: 48px; height: 48px; }
.wheel-item.sub-item .wheel-item-label {
  font-size: 8px;
  max-width: 78px;
  white-space: normal;
  line-height: 1.1;
}
/* Label catégorie : AU-DESSUS du wheel (réorganisation HTML via flexbox) */
.wheel-section {
  flex-direction: column;
}
.wheel-cat-label {
  font-family: 'Cinzel', serif;
  font-size: 11px;
  color: var(--gold);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  text-align: center;
  margin-bottom: 10px;
  min-height: 18px;
  transition: opacity 0.3s;
  order: -1; /* passe au-dessus dans le flex */
}
.wheel-back-btn {
  display: none;
  align-items: center; gap: 6px;
  margin-top: 10px;
  padding: 7px 18px;
  border-radius: 20px;
  border: 1px solid var(--gold-dark);
  background: transparent;
  color: var(--gold);
  font-family: 'Cinzel', serif;
  font-size: 11px;
  letter-spacing: 0.1em;
  cursor: pointer;
  transition: background 0.2s, color 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.wheel-back-btn:active { background: var(--gold); color: var(--bg); }
.wheel-back-btn.visible { display: flex; }
@keyframes goldPulse {
  0%   { box-shadow: 0 0 0 0 rgba(201,168,76,0.5); }
  70%  { box-shadow: 0 0 0 14px rgba(201,168,76,0); }
  100% { box-shadow: 0 0 0 0 rgba(201,168,76,0); }
}
.wheel-center.pulse { animation: goldPulse 1.8s ease-out 0.5s 2; }
</style>

<script src="js/main.js"></script>
<script>
// ===== WHEEL DATA =====
const WHEEL_CATS = [
  { id:'repas',     img:'images/repas.png',    url:'repas.html',
    label:{fr:'Repas',en:'Meals',es:'Comidas'},
    subs:[
      {label:{fr:'Avant manger',en:'Before',es:'Antes'},url:'repas.html#acc1'},
      {label:{fr:'Oubli Bismillah',en:'Forgot',es:'Olvidó'},url:'repas.html#acc2'},
      {label:{fr:'Après manger',en:'After',es:'Después'},url:'repas.html#acc3'},
      {label:{fr:'Sunnahs',en:'Sunnahs',es:'Sunnahs'},url:'repas.html#acc4'},
    ]
  },
  { id:'reveil',    img:'images/lit.png',      url:'reveil.html',
    label:{fr:'Réveil\nCouché',en:'Wake\nSleep',es:'Despertar\nDormir'},
    subs:[
      {label:{fr:'Au réveil',en:'Waking',es:'Despertar'},url:'reveil.html#acc1'},
      {label:{fr:'Se coucher',en:'Sleeping',es:'Dormir'},url:'reveil.html#acc2'},
      {label:{fr:'Variante',en:'Variant',es:'Variante'},url:'reveil.html#acc3'},
      {label:{fr:'Sunnahs',en:'Sunnahs',es:'Sunnahs'},url:'reveil.html#acc4'},
    ]
  },
  { id:'tristesse', img:'images/tristesse.png',url:'tristesse.html',
    label:{fr:'Tristesse',en:'Sadness',es:'Tristeza'},
    subs:[
      {label:{fr:'Tristesse',en:'Sadness',es:'Tristeza'},url:'tristesse.html#acc1'},
      {label:{fr:'Dua Coran',en:"Qur'an",es:'Corán'},url:'tristesse.html#acc2'},
      {label:{fr:'Sunnahs',en:'Sunnahs',es:'Sunnahs'},url:'tristesse.html#acc3'},
    ]
  },
  { id:'toilettes', img:'images/wc.png',       url:'toilettes.html',
    label:{fr:'Toilettes',en:'Restroom',es:'Baño'},
    subs:[
      {label:{fr:'Avant',en:'Before',es:'Antes'},url:'toilettes.html#acc1'},
      {label:{fr:'Après',en:'After',es:'Después'},url:'toilettes.html#acc2'},
      {label:{fr:'Sunnahs',en:'Sunnahs',es:'Sunnahs'},url:'toilettes.html#acc3'},
    ]
  },
  { id:'ablution',  img:'images/ablution.png', url:'ablution.html',
    label:{fr:'Ablution',en:'Ablution',es:'Ablución'},
    subs:[
      {label:{fr:'Avant wudu',en:'Before',es:'Antes'},url:'ablution.html#acc1'},
      {label:{fr:'Shahada',en:'Shahada',es:'Shahada'},url:'ablution.html#acc2'},
      {label:{fr:'Dua après',en:'Dua after',es:'Dua'},url:'ablution.html#acc3'},
      {label:{fr:'Sunnahs',en:'Sunnahs',es:'Sunnahs'},url:'ablution.html#acc4'},
    ]
  },
  { id:'maison',    img:'images/maison.png',   url:'maison.html',
    label:{fr:'Maison',en:'Home',es:'Casa'},
    subs:[
      {label:{fr:'Entrer',en:'Enter',es:'Entrar'},url:'maison.html#acc1'},
      {label:{fr:'Variante',en:'Variant',es:'Variante'},url:'maison.html#acc2'},
      {label:{fr:'Sortir',en:'Leave',es:'Salir'},url:'maison.html#acc3'},
      {label:{fr:'Protection',en:'Protection',es:'Protección'},url:'maison.html#acc4'},
      {label:{fr:'Sunnahs',en:'Sunnahs',es:'Sunnahs'},url:'maison.html#acc5'},
    ]
  },
  { id:'enfants',   img:'images/enfants.png',  url:'enfants.html',
    label:{fr:'Enfants',en:'Children',es:'Niños'},
    subs:[
      {label:{fr:'Protéger',en:'Protect',es:'Proteger'},url:'enfants.html#acc1'},
      {label:{fr:'Enfant unique',en:'One child',es:'Único'},url:'enfants.html#acc2'},
      {label:{fr:'Sunnahs',en:'Sunnahs',es:'Sunnahs'},url:'enfants.html#acc3'},
    ]
  },
  { id:'transport', img:'images/voiture.png',  url:'transport.html',
    label:{fr:'Transport',en:'Transport',es:'Transporte'},
    subs:[
      {label:{fr:'En montant',en:'Boarding',es:'Al subir'},url:'transport.html#acc1'},
      {label:{fr:'Long trajet',en:'Long trip',es:'Viaje'},url:'transport.html#acc2'},
      {label:{fr:'Sunnahs',en:'Sunnahs',es:'Sunnahs'},url:'transport.html#acc3'},
    ]
  },
];

let wheelState = 'root';

function getWheelLang() {
  return localStorage.getItem('deentag_lang') || 'fr';
}

function getPos(i, total, radius) {
  const angle = (i / total) * 2 * Math.PI - Math.PI / 2;
  return { x: 180 + radius * Math.cos(angle), y: 180 + radius * Math.sin(angle) };
}

function labelShort(lbl) {
  return (lbl || '').replace(/\n/g, ' ');
}

function renderRoot(animate) {
  const container = document.getElementById('wheel-container');
  container.querySelectorAll('.wheel-item').forEach(el => el.remove());
  wheelState = 'root';

  const lang = getWheelLang();
  WHEEL_CATS.forEach((cat, i) => {
    const pos = getPos(i, WHEEL_CATS.length, 125);
    const el = document.createElement('div');
    el.className = 'wheel-item' + (animate ? ' hidden' : '');
    el.onclick = () => openCat(cat);
    el.innerHTML =
      '<div class="wheel-item-circle"><img src="' + cat.img + '" alt=""></div>' +
      '<span class="wheel-item-label">' + labelShort(cat.label[lang] || cat.label.fr) + '</span>';
    el.style.left = pos.x + 'px';
    el.style.top  = pos.y + 'px';
    container.appendChild(el);
    if (animate) setTimeout(() => el.classList.remove('hidden'), 30 + i * 45);
  });

  // Reset centre
  document.getElementById('wheel-center-img').src = 'images/logo.png';
  document.getElementById('wheel-center').classList.remove('active-cat');
  document.getElementById('wheel-center').onclick = onCenterClick;
  document.getElementById('wheel-cat-label').textContent = '';
  document.getElementById('wheel-back-btn').classList.remove('visible');
}

function openCat(cat) {
  wheelState = cat.id;
  const container = document.getElementById('wheel-container');
  const lang = getWheelLang();

  // Disparition
  container.querySelectorAll('.wheel-item').forEach((el, i) => {
    el.style.transition = 'transform 0.28s ease ' + (i*20) + 'ms, opacity 0.22s ease ' + (i*15) + 'ms';
    el.classList.add('hidden');
  });

  setTimeout(() => {
    // Centre → icône catégorie
    const centerImg = document.getElementById('wheel-center-img');
    centerImg.src = cat.img;
    document.getElementById('wheel-center').classList.add('active-cat');
    document.getElementById('wheel-center').onclick = () => { window.location.href = cat.url; };
    document.getElementById('wheel-cat-label').textContent = labelShort(cat.label[lang] || cat.label.fr).toUpperCase();
    document.getElementById('wheel-back-btn').classList.add('visible');

    container.querySelectorAll('.wheel-item').forEach(el => el.remove());

    const subs = cat.subs;
    const radius = subs.length <= 3 ? 118 : subs.length <= 4 ? 122 : 126;
    subs.forEach((sub, i) => {
      const pos = getPos(i, subs.length, radius);
      const el = document.createElement('a');
      el.className = 'wheel-item sub-item hidden';
      el.href = sub.url;
      const lbl = sub.label[lang] || sub.label.fr;
      // Cherche le SVG correspondant dans PAGE_WHEEL_DATA de main.js
      const pageData = PAGE_WHEEL_DATA[cat.id];
      const subData = pageData ? pageData.subs[i] : null;
      const iconHTML = (subData && subData.svg)
        ? '<div class="wheel-item-svg">' + subData.svg + '</div>'
        : '<img src="' + cat.img + '" alt="">';
      el.innerHTML =
        '<div class="wheel-item-circle">' + iconHTML + '</div>' +
        '<span class="wheel-item-label">' + lbl + '</span>';
      el.style.left = pos.x + 'px';
      el.style.top  = pos.y + 'px';
      container.appendChild(el);
      setTimeout(() => el.classList.remove('hidden'), 80 + i * 55);
    });
  }, 240);
}

function goBack() { renderRoot(true); }

function onCenterClick() {
  if (wheelState !== 'root') return;
  const img = document.getElementById('wheel-center-img');
  img.style.transition = 'transform 0.5s ease';
  img.style.transform = 'rotate(360deg)';
  setTimeout(() => { img.style.transform = ''; img.style.transition = ''; }, 520);
}

// Sync langue
const _sl = window.setLang;
window.setLang = function(lang) {
  _sl(lang);
  if (wheelState === 'root') renderRoot(false);
  else {
    // Met à jour les labels sub
    const cat = WHEEL_CATS.find(c => c.id === wheelState);
    if (cat) {
      document.getElementById('wheel-cat-label').textContent = labelShort(cat.label[lang] || cat.label.fr).toUpperCase();
      document.querySelectorAll('#wheel-container .wheel-item.sub-item .wheel-item-label').forEach((el, i) => {
        if (cat.subs[i]) el.textContent = cat.subs[i].label[lang] || cat.subs[i].label.fr;
      });
    }
  }
};

document.addEventListener('DOMContentLoaded', () => renderRoot(true));
</script>
</body>
