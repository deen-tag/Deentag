<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="description" content="Deentag Kids — Le Coran pour les enfants">
<meta name="theme-color" content="#1A2A4A">
<title>Deentag Kids — Coran</title>
<link rel="stylesheet" href="css/quran-kids.css">
<link rel="icon" href="favicon.png" type="image/png">
</head>
<body>

<!-- PAGE ACCUEIL : grille de sourates -->
<div id="pageHome">

  <!-- TOPBAR -->
  <div class="kids-topbar">
    <div class="kids-topbar-left">
      <a href="quran.html" class="kids-back-btn" title="Version adulte">📖</a>
    </div>
    <div class="kids-topbar-center">
      <img src="images/kids_logo.webp" alt="Deentag Kids" class="kids-topbar-logo"
           onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
      <div style="display:none;font-family:'Baloo 2',cursive;font-size:20px;font-weight:800;background:linear-gradient(135deg,#6C63FF,#FF6B6B);-webkit-background-clip:text;-webkit-text-fill-color:transparent">DEENTAG KIDS</div>
    </div>
    <div class="kids-topbar-right">
      <div style="position:relative;">
        <button style="background:white;border:2.5px solid #E0D0FF;border-radius:50px;padding:6px 10px;font-family:'Baloo 2',cursive;font-size:11px;font-weight:800;color:#6C63FF;cursor:pointer;" id="lang-btn" onclick="kidsToggleLangMenu()">FR ▾</button>
        <div style="position:absolute;right:0;top:calc(100% + 6px);z-index:500;background:white;border:2.5px solid #E0D0FF;border-radius:16px;overflow:hidden;box-shadow:0 4px 18px rgba(108,99,255,0.15);min-width:140px;display:none;flex-direction:column;" id="lang-menu">
          <span class="lang-option" data-lang="de" onclick="kidsSetLang('de')"><span class="lang-flag">🇩🇪</span>Deutsch</span>
          <span class="lang-option" data-lang="en" onclick="kidsSetLang('en')"><span class="lang-flag">🇬🇧</span>English</span>
          <span class="lang-option" data-lang="es" onclick="kidsSetLang('es')"><span class="lang-flag">🇪🇸</span>Español</span>
          <span class="lang-option" data-lang="fr" onclick="kidsSetLang('fr')"><span class="lang-flag">🇫🇷</span>Français</span>
          <span class="lang-option" data-lang="it" onclick="kidsSetLang('it')"><span class="lang-flag">🇮🇹</span>Italiano</span>
          <span class="lang-option" data-lang="nl" onclick="kidsSetLang('nl')"><span class="lang-flag">🇳🇱</span>Nederlands</span>
          <span class="lang-option" data-lang="pt" onclick="kidsSetLang('pt')"><span class="lang-flag">🇵🇹</span>Português</span>
          <span class="lang-option" data-lang="tr" onclick="kidsSetLang('tr')"><span class="lang-flag">🇹🇷</span>Türkçe</span>
        </div>
      </div>
    </div>
  </div>

  <!-- HEADER -->
  <div class="kids-header">
    <span class="kids-header-arabic">القرآن الكريم</span>
    <div class="kids-header-title">Le Saint Coran 🌟</div>
    <div class="kids-header-sub" id="homeSubtitle">Choisis une sourate !</div>
  </div>

  <!-- GRILLE SOURATES -->
  <div class="kids-surah-grid" id="surahGrid"></div>

  <div class="spacer-sm"></div>
</div>

<!-- PAGE LECTURE SOURATE -->
<div id="pageSurah" style="display:none; flex-direction:column; height:100dvh; overflow:hidden;">

  <!-- TOPBAR SOURATE -->
  <div class="kids-topbar surah-read-topbar">
    <div class="kids-topbar-left">
      <button class="kids-back-btn" onclick="kidsBackToHome()">←</button>
    </div>
    <div class="kids-topbar-center">
      <div>
        <div class="surah-topbar-name-ar" id="surahTopbarAr"></div>
        <div class="surah-topbar-name-fr" id="surahTopbarFr"></div>
      </div>
    </div>
    <div class="kids-topbar-right">
      <button class="kids-back-btn" style="font-size:16px;" onclick="kidsOpenSettings()">⚙️</button>
    </div>
  </div>

  <!-- SCROLL VERSETS -->
  <div id="surahScroll" style="flex:1;overflow-y:auto;padding:0 14px 80px;position:relative;z-index:1;"></div>

  <!-- BARRE AUDIO -->
  <div class="surah-audio-bar">
    <button class="audio-prev-btn" onclick="kidsPrevVerse()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
    </button>
    <button class="audio-play-btn" id="audioPlayBtn" onclick="kidsToggleAudio()">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
    </button>
    <div class="audio-verse-info">
      <span class="audio-verse-label">Verset</span>
      <span class="audio-verse-num" id="audioVerseNum">— / —</span>
    </div>
    <button class="audio-speed-btn" id="audioSpeedBtn" onclick="kidsCycleSpeed()">1x</button>
    <button class="audio-next-btn" onclick="kidsNextVerse()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
    </button>
  </div>

</div>

<!-- PAGE CORAN ENTIER : liste de toutes les sourates -->
<div id="pageAll" style="display:none; flex-direction:column; height:100dvh; overflow:hidden;">
  <div class="kids-topbar surah-read-topbar">
    <div class="kids-topbar-left">
      <button class="kids-back-btn" onclick="kidsBackToHome()">←</button>
    </div>
    <div class="kids-topbar-center">
      <div style="font-family:'Baloo 2',cursive;font-size:15px;font-weight:800;color:#6C63FF;" id="allPageTitle">📚 Tout le Coran</div>
    </div>
    <div class="kids-topbar-right" style="width:44px;"></div>
  </div>
  <div style="flex:1;overflow-y:auto;padding:8px 12px 32px;">
    <div class="all-surah-list" id="allSurahList"></div>
  </div>
</div>

<!-- SETTINGS PANEL -->
<div class="settings-panel" id="surahSettingsPanel">
  <button class="settings-panel-close" onclick="kidsCloseSettings()">✕</button>
  <div class="settings-panel-title">⚙️ Réglages</div>
  <div class="size-row">
    <span class="size-row-label">Arabe</span>
    <div class="size-pills">
      <button class="size-pill" data-type="ar" data-val="small"  onclick="event.stopPropagation();kidsApplySizeLevel('ar','small')">P</button>
      <button class="size-pill active" data-type="ar" data-val="medium" onclick="event.stopPropagation();kidsApplySizeLevel('ar','medium')">M</button>
      <button class="size-pill" data-type="ar" data-val="large"  onclick="event.stopPropagation();kidsApplySizeLevel('ar','large')">G</button>
    </div>
  </div>
  <div class="size-row">
    <span class="size-row-label">Phonétique</span>
    <div class="size-pills">
      <button class="size-pill" data-type="ph" data-val="small"  onclick="event.stopPropagation();kidsApplySizeLevel('ph','small')">P</button>
      <button class="size-pill active" data-type="ph" data-val="medium" onclick="event.stopPropagation();kidsApplySizeLevel('ph','medium')">M</button>
      <button class="size-pill" data-type="ph" data-val="large"  onclick="event.stopPropagation();kidsApplySizeLevel('ph','large')">G</button>
    </div>
  </div>
  <div class="size-row">
    <span class="size-row-label">Traduction</span>
    <div class="size-pills">
      <button class="size-pill" data-type="tr" data-val="small"  onclick="event.stopPropagation();kidsApplySizeLevel('tr','small')">P</button>
      <button class="size-pill active" data-type="tr" data-val="medium" onclick="event.stopPropagation();kidsApplySizeLevel('tr','medium')">M</button>
      <button class="size-pill" data-type="tr" data-val="large"  onclick="event.stopPropagation();kidsApplySizeLevel('tr','large')">G</button>
    </div>
  </div>
  <div class="toggle-row">
    <span class="toggle-label">Phonétique</span>
    <div class="toggle-switch on" id="togglePhonetic" onclick="kidsTogglePhonetic(this)"></div>
  </div>
  <div class="toggle-row">
    <span class="toggle-label">Traduction</span>
    <div class="toggle-switch on" id="toggleTranslation" onclick="kidsToggleTranslation(this)"></div>
  </div>
</div>

<!-- CONFETTIS -->
<div class="confetti-container" id="confettiContainer"></div>

<style>
.lang-option {
  display:flex; align-items:center; gap:8px; padding:10px 14px; cursor:pointer;
  font-family:'Baloo 2',cursive; font-size:12px; font-weight:700; color:#333;
  transition:background 0.15s;
}
.lang-flag { font-size:16px; }
.lang-option:hover, .lang-option.active { background:#EDEAFF; color:#6C63FF; }
#lang-menu.open { display:flex !important; }
</style>

<script src="js/quran.js"></script>
<script src="js/quran-kids.js"></script>
</body>
</html>
